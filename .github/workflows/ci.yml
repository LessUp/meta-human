# MetaHuman Engine - CI & Deploy
# 极简工作流：质量检查 + 构建 + 部署 + 发布

name: CI & Deploy

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ========== 质量检查 ==========
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  # ========== 部署 Pages ==========
  deploy:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: https://lessup.github.io/meta-human/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --prefer-offline

      - name: Build for Pages
        run: npm run build:pages
        env:
          NODE_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - uses: actions/deploy-pages@v4

  # ========== 发布 Release ==========
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: softprops/action-gh-release@v2
        with:
          name: MetaHuman Engine ${{ github.ref_name }}
          body: |
            ## MetaHuman Engine ${{ github.ref_name }}

            ### 🚀 Features
            - 🎭 3D Avatar Engine with emotion-driven expressions
            - 🗣️ Voice Interaction (TTS/ASR)
            - 👁️ Visual Perception (MediaPipe)
            - 🧠 Streaming Dialogue

            ### 🔗 Links
            - 🌐 Demo: https://lessup.github.io/meta-human/
            - 📖 Docs: https://github.com/LessUp/meta-human/tree/main/docs
          draft: false
          prerelease: false

<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0A0B0D"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1B1D" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid)"/>
  
  <!-- 3D Avatar Body (stylized representation) -->
  <g transform="translate(400, 280)">
    <!-- Head -->
    <circle cx="0" cy="-100" r="60" fill="#2A2B2D" stroke="#32F08C" stroke-width="2"/>
    <!-- Face features -->
    <circle cx="-20" cy="-105" r="8" fill="#32F08C"/>
    <circle cx="20" cy="-105" r="8" fill="#32F08C"/>
    <path d="M -15 -85 Q 0 -75 15 -85" stroke="#32F08C" stroke-width="3" fill="none"/>
    <!-- Emotion indicator -->
    <circle cx="50" cy="-140" r="12" fill="#FF6B6B"/>
    <text x="50" y="-135" text-anchor="middle" fill="white" font-size="12" font-family="system-ui, -apple-system, sans-serif">😊</text>
    
    <!-- Torso -->
    <path d="M -50 -40 L -60 80 L 60 80 L 50 -40 Z" fill="#1E1F21" stroke="#32F08C" stroke-width="2" stroke-opacity="0.5"/>
    
    <!-- Shoulders -->
    <ellipse cx="-80" cy="-20" rx="30" ry="50" fill="#252627" stroke="#32F08C" stroke-width="2" stroke-opacity="0.3"/>
    <ellipse cx="80" cy="-20" rx="30" ry="50" fill="#252627" stroke="#32F08C" stroke-width="2" stroke-opacity="0.3"/>
  </g>
  
  <!-- Chat bubbles -->
  <g transform="translate(120, 150)">
    <rect x="0" y="0" width="160" height="50" rx="12" fill="#1E1F21" stroke="#32F08C" stroke-width="1.5"/>
    <text x="15" y="22" fill="#32F08C" font-family="system-ui, -apple-system, sans-serif" font-size="12">User:</text>
    <text x="15" y="40" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="13">Tell me a joke!</text>
  </g>
  
  <g transform="translate(520, 150)">
    <rect x="0" y="0" width="200" height="70" rx="12" fill="#1E1F21" stroke="#32F08C" stroke-width="1.5"/>
    <text x="15" y="22" fill="#32F08C" font-family="system-ui, -apple-system, sans-serif" font-size="12">Avatar:</text>
    <text x="15" y="40" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="13">Why don't skeletons fight?</text>
    <text x="15" y="58" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="13">They don't have the guts! 😄</text>
    <!-- Action indicator -->
    <circle cx="180" cy="55" r="8" fill="#32F08C" opacity="0.3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="55" r="4" fill="#32F08C"/>
  </g>
  
  <!-- Voice wave -->
  <g transform="translate(580, 350)">
    <rect x="0" y="0" width="120" height="40" rx="8" fill="#1E1F21" stroke="#32F08C" stroke-width="1"/>
    <g transform="translate(15, 20)">
      <rect x="0" y="-10" width="4" height="20" rx="2" fill="#32F08C">
        <animate attributeName="height" values="20;8;20" dur="0.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-10;-4;-10" dur="0.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="12" y="-8" width="4" height="16" rx="2" fill="#32F08C">
        <animate attributeName="height" values="16;6;16" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-8;-3;-8" dur="0.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="24" y="-12" width="4" height="24" rx="2" fill="#32F08C">
        <animate attributeName="height" values="24;10;24" dur="0.7s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-12;-5;-12" dur="0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="36" y="-6" width="4" height="12" rx="2" fill="#32F08C">
        <animate attributeName="height" values="12;4;12" dur="0.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-6;-2;-6" dur="0.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="-14" width="4" height="28" rx="2" fill="#32F08C">
        <animate attributeName="height" values="28;12;28" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-14;-6;-14" dur="0.9s" repeatCount="indefinite"/>
      </rect>
      <rect x="60" y="-8" width="4" height="16" rx="2" fill="#32F08C">
        <animate attributeName="height" values="16;6;16" dur="0.6s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-8;-3;-8" dur="0.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="72" y="-10" width="4" height="20" rx="2" fill="#32F08C">
        <animate attributeName="height" values="20;8;20" dur="0.8s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-10;-4;-10" dur="0.8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- Vision detection points -->
  <g transform="translate(200, 300)">
    <rect x="0" y="0" width="100" height="80" rx="8" fill="#1E1F21" stroke="#32F08C" stroke-width="1"/>
    <text x="50" y="20" text-anchor="middle" fill="#32F08C" font-family="system-ui, -apple-system, sans-serif" font-size="11">Face Mesh</text>
    <g transform="translate(30, 35)">
      <!-- Face outline dots -->
      <circle cx="5" cy="5" r="2" fill="#32F08C" opacity="0.6"/>
      <circle cx="15" cy="3" r="2" fill="#32F08C" opacity="0.8"/>
      <circle cx="25" cy="5" r="2" fill="#32F08C" opacity="0.6"/>
      <circle cx="8" cy="15" r="2" fill="#32F08C" opacity="0.7"/>
      <circle cx="20" cy="15" r="2" fill="#32F08C" opacity="0.7"/>
      <circle cx="15" cy="25" r="2" fill="#32F08C" opacity="0.9"/>
      <circle cx="5" cy="30" r="2" fill="#32F08C" opacity="0.5"/>
      <circle cx="25" cy="30" r="2" fill="#32F08C" opacity="0.5"/>
    </g>
  </g>
  
  <!-- Title overlay -->
  <text x="400" y="40" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600">MetaHuman Engine</text>
  <text x="400" y="65" text-anchor="middle" fill="#888" font-family="system-ui, -apple-system, sans-serif" font-size="12">Real-time 3D digital human with voice, vision & dialogue</text>
  
  <!-- Feature badges -->
  <g transform="translate(250, 410)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#1E1F21" stroke="#32F08C" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#32F08C" font-family="system-ui, -apple-system, sans-serif" font-size="10">🎭 3D Avatar</text>
  </g>
  <g transform="translate(340, 410)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#1E1F21" stroke="#32F08C" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#32F08C" font-family="system-ui, -apple-system, sans-serif" font-size="10">🗣️ Voice</text>
  </g>
  <g transform="translate(430, 410)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#1E1F21" stroke="#32F08C" stroke-width="1"/>
    <text x="40" y="16" text-anchor="middle" fill="#32F08C" font-family="system-ui, -apple-system, sans-serif" font-size="10">👁️ Vision</text>
  </g>
</svg>

<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaHuman Engine</title>
    <script>
      // SPA redirect for GitHub Pages
      // 保存当前 URL 到 sessionStorage，应用加载后重定向到正确路由
      (function() {
        var path = window.location.pathname;
        var repo = '/meta-human';
        
        // 移除仓库前缀获取实际路径（兼容带/不带尾部斜杠）
        if (path.indexOf(repo) === 0) {
          path = path.substring(repo.length);
          if (path === '' || path === '/') {
            path = '/';
          }
        }
        
        // 保存重定向信息
        sessionStorage.setItem('spa_redirect', JSON.stringify({
          path: path,
          search: window.location.search,
          hash: window.location.hash
        }));
        
        // 重定向到首页（使用带尾部斜杠的标准路径）
        window.location.replace('/meta-human/');
      })();
    </script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: #888;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
      }
      .container {
        padding: 2rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      h1 {
        color: #fff;
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <h1>MetaHuman Engine</h1>
      <p>正在重定向到应用...</p>
    </div>
  </body>
</html>
